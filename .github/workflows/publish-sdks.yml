name: Publish SDKs

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag/ref to publish from (for example, v0.8.1)'
        required: true
        type: string
      publish_python:
        description: 'Publish Python SDK to PyPI'
        required: false
        type: boolean
        default: true
      publish_npm:
        description: 'Publish TypeScript SDK to npm'
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write

jobs:
  package-release-assets:
    name: Build GitHub release packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Derive package version
        env:
          SDK_TAG: ${{ inputs.tag }}
        run: |
          VERSION="${SDK_TAG#v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$SDK_TAG" ]; then
            echo "tag must start with v, got: $SDK_TAG" >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set Python package version from tag
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION"]
          path = Path("python/aplanesdk/_version.py")
          text = path.read_text(encoding="utf-8")
          updated, count = re.subn(
              r'(?m)^__version__ = "[^"]+"$',
              f'__version__ = "{version}"',
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit("failed to update python/aplanesdk/_version.py version")
          path.write_text(updated, encoding="utf-8")
          print(f"Set Python SDK version to {version}")
          PY

      - name: Build Python packages
        run: |
          python -m pip install --upgrade build
          python -m build
        working-directory: python

      - name: Set TypeScript package version from tag
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const version = process.env.VERSION;
          for (const file of ["package.json", "package-lock.json"]) {
            const data = JSON.parse(fs.readFileSync(file, "utf8"));
            data.version = version;
            if (data.packages && data.packages[""]) {
              data.packages[""].version = version;
            }
            fs.writeFileSync(file, JSON.stringify(data, null, 2) + "\n");
          }
          console.log(`Set TypeScript SDK version to ${version}`);
          NODE
        working-directory: typescript

      - name: Build TypeScript package
        run: |
          npm ci
          npm pack
        working-directory: typescript

      - name: Build Go SDK source archive
        run: |
          mkdir -p release-assets
          git archive \
            --format=tar.gz \
            --prefix="aplanesdk-go-sdk-$VERSION/" \
            --output="release-assets/aplanesdk-go-sdk-$VERSION.tar.gz" \
            HEAD:go

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          cp "python/dist/aplanesdk-$VERSION.tar.gz" \
            "release-assets/aplanesdk-$VERSION-py3.tgz"
          cp "typescript/aplanesdk-$VERSION.tgz" \
            "release-assets/aplanesdk-$VERSION-ts.tgz"
          ls -lh release-assets

      - name: Write GitHub Release notes
        env:
          SDK_TAG: ${{ inputs.tag }}
        run: |
          cat > release-notes.md <<EOF
          SDK release packages for $SDK_TAG.

          This is the aplanesdk repository release. GitHub release tarballs
          use language-qualified filenames; package registries retain their
          canonical package filenames:

          - \`aplanesdk-$VERSION-py3.tgz\` - Python SDK source distribution for the PyPI package \`aplanesdk\`
          - \`aplanesdk-$VERSION-ts.tgz\` - TypeScript SDK npm package tarball for the npm package \`aplanesdk\`
          - \`aplanesdk-go-sdk-$VERSION.tar.gz\` - Go SDK source archive
          EOF

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          SDK_TAG: ${{ inputs.tag }}
        run: |
          if gh release view "$SDK_TAG" >/dev/null 2>&1; then
            release_id="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$SDK_TAG" --jq .id)"
            gh api -X PATCH "repos/$GITHUB_REPOSITORY/releases/$release_id" \
              -f body="$(cat release-notes.md)" >/dev/null
            gh release upload "$SDK_TAG" release-assets/* --clobber
          else
            gh release create "$SDK_TAG" release-assets/* \
              --title "$SDK_TAG" \
              --notes-file release-notes.md
          fi

  publish-pypi:
    name: Publish Python SDK to PyPI
    if: ${{ inputs.publish_python }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set package version from tag
        env:
          SDK_TAG: ${{ inputs.tag }}
        run: |
          export VERSION="${SDK_TAG#v}"
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION"]
          path = Path("python/aplanesdk/_version.py")
          text = path.read_text(encoding="utf-8")
          updated, count = re.subn(
              r'(?m)^__version__ = "[^"]+"$',
              f'__version__ = "{version}"',
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit("failed to update python/aplanesdk/_version.py version")
          path.write_text(updated, encoding="utf-8")
          print(f"Set Python SDK version to {version}")
          PY

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build
        working-directory: python

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist
          skip-existing: true

  publish-npm:
    name: Publish TypeScript SDK to npm
    if: ${{ inputs.publish_npm }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install npm with trusted publishing support
        run: |
          npm install -g npm@11
          npm --version

      - name: Set package version from tag
        env:
          SDK_TAG: ${{ inputs.tag }}
        run: |
          VERSION="${SDK_TAG#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
        working-directory: typescript

      - name: Install dependencies
        run: npm ci
        working-directory: typescript

      - name: Build package
        run: npm run build
        working-directory: typescript

      - name: Publish to npm
        env:
          SDK_TAG: ${{ inputs.tag }}
        run: |
          VERSION="${SDK_TAG#v}"
          if npm view "aplanesdk@$VERSION" version >/dev/null 2>&1; then
            echo "aplanesdk@$VERSION already published; skipping"
            exit 0
          fi
          npm publish --provenance --access public
        working-directory: typescript
